<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Question Answering System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 40px;
            width: 100%;
            max-width: 700px;
        }

        h1 {
            font-size: 1.5rem;
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #999;
            font-size: 0.88rem;
            margin-bottom: 28px;
        }

        /* ── Input ── */
        .input-row {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus { border-color: #4a90d9; }
        input[type="text"]::placeholder { color: #bbb; }

        .ask-btn {
            padding: 12px 28px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .ask-btn:hover { background: #3a7bc8; }
        .ask-btn:disabled { background: #b0c4de; cursor: not-allowed; }

        /* ── Loading ── */
        .loading {
            display: none;
            text-align: center;
            margin-top: 24px;
            color: #4a90d9;
            font-size: 0.92rem;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid #d0e0f0;
            border-top-color: #4a90d9;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Answer ── */
        .result {
            display: none;
            margin-top: 28px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .answer-box {
            background: #f8faff;
            border-left: 4px solid #4a90d9;
            border-radius: 6px;
            padding: 20px;
            font-size: 0.93rem;
            line-height: 1.8;
            color: #2c2c2c;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* ── Sources & Confidence ── */
        .meta-row {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .conf-high   { background: #e6f9ed; color: #1a7f37; }
        .conf-medium { background: #fff8e1; color: #9a6700; }
        .conf-low    { background: #ffebee; color: #c62828; }
        .tag-latency { background: #f0f0f0; color: #666; }

        .sources {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #888;
        }

        .sources span { color: #4a90d9; }

        /* ── Error ── */
        .answer-box.error {
            background: #fff5f5;
            border-left-color: #e53e3e;
            color: #c53030;
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .container { padding: 24px; }
            .input-row { flex-direction: column; }
            .ask-btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 RAG Question Answering System</h1>
        <p class="subtitle">Ask questions about your documents</p>

        <div class="input-row">
            <input type="text" id="queryInput" placeholder="Type your question here..." />
            <button class="ask-btn" id="askBtn" onclick="askQuestion()">Ask</button>
        </div>

        <div class="loading" id="loading">
            <span class="spinner"></span> Searching documents...
        </div>

        <div class="result" id="result">
            <div class="result-label">Answer</div>
            <div class="answer-box" id="answerBox"></div>
            <div class="meta-row" id="metaRow"></div>
            <div class="sources" id="sources"></div>
        </div>
    </div>

    <script>
        var queryInput = document.getElementById('queryInput');
        var askBtn     = document.getElementById('askBtn');
        var loading    = document.getElementById('loading');
        var result     = document.getElementById('result');
        var answerBox  = document.getElementById('answerBox');
        var metaRow    = document.getElementById('metaRow');
        var sources    = document.getElementById('sources');

        queryInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') askQuestion();
        });

        async function askQuestion() {
            var query = queryInput.value.trim();
            if (!query) return;

            // Show loading, hide old result
            loading.style.display = 'block';
            result.style.display  = 'none';
            askBtn.disabled       = true;
            answerBox.className   = 'answer-box';

            try {
                var res = await fetch('/ask?query=' + encodeURIComponent(query));
                if (!res.ok) throw new Error('Server error: ' + res.status);

                var data = await res.json();
                if (data.error) throw new Error(data.error);

                // Show answer
                answerBox.textContent = data.answer;

                // Confidence + Latency tags
                var confClass = 'tag conf-' + (data.confidence || 'low');
                metaRow.innerHTML =
                    '<span class="tag ' + confClass + '">● ' + capitalize(data.confidence || 'unknown') + ' confidence</span>' +
                    '<span class="tag tag-latency">⏱ ' + (data.latency_ms || 0) + ' ms</span>';

                // Sources
                if (data.citations && data.citations.length > 0) {
                    var names = data.citations.map(function(c) {
                        return c.split('/').pop().split('\\').pop();
                    });
                    sources.innerHTML = 'Sources: <span>' + names.join(', ') + '</span>';
                } else {
                    sources.innerHTML = '';
                }

                result.style.display = 'block';

            } catch (err) {
                answerBox.textContent = 'Error: ' + err.message;
                answerBox.className   = 'answer-box error';
                metaRow.innerHTML     = '';
                sources.innerHTML     = '';
                result.style.display  = 'block';
            }

            loading.style.display = 'none';
            askBtn.disabled       = false;
        }

        function capitalize(s) {
            return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
        }
    </script>
</body>
</html>
